<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <style>
      .core-left { fill: #1f3042; }
      .core-right { fill: #131c27; }
      
      .inner-border-left { fill: #385d82; }
      .inner-border-right { fill: #26425e; }
      
      .outer-armor-left { fill: #5b8db8; }
      .outer-armor-right { fill: #487399; }
      
      .accent { fill: #8cc4eb; }
      .accent-dark { fill: #67a4cf; }
      
      /* The stroke acts as a negative-space gap between the armor plates */
      .gap { stroke: #030712; stroke-width: 3.5; stroke-linejoin: round; }
    </style>
    <!-- Gradient to create the two-tone split color for the 'S' -->
    <linearGradient id="splitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="50%" stop-color="#8cc4eb" />
      <stop offset="50%" stop-color="#67a4cf" />
    </linearGradient>
  </defs>

  <g class="gap">
    <!-- CORE HEXAGON -->
    <polygon points="100,50 60,73 60,127 100,150" class="core-left" />
    <polygon points="100,50 140,73 140,127 100,150" class="core-right" />

    <!-- inner top plates -->
    <polygon points="100,25 60,48 60,73 100,50" class="inner-border-left" />
    <polygon points="100,25 140,48 140,73 100,50" class="inner-border-right" />
    
    <!-- inner bottom plates -->
    <polygon points="100,175 60,152 60,127 100,150" class="inner-border-left" />
    <polygon points="100,175 140,152 140,127 100,150" class="inner-border-right" />

    <!-- outer top armor -->
    <polygon points="100,8 40,42 40,80 52,73 52,49 100,21" class="outer-armor-left" />
    <!-- outer side armor -->
    <polygon points="40,88 25,97 25,123 40,112" class="outer-armor-left" />
    <!-- outer bottom armor -->
    <polygon points="40,120 40,158 100,192 100,179 52,151 52,127" class="outer-armor-left" />
    
    <!-- outer top armor right -->
    <polygon points="100,8 160,42 160,80 148,73 148,49 100,21" class="outer-armor-right" />
    <!-- outer side armor right -->
    <polygon points="160,88 175,97 175,123 160,112" class="outer-armor-right" />
    <!-- outer bottom armor right -->
    <polygon points="160,120 160,158 100,192 100,179 148,151 148,127" class="outer-armor-right" />

    <!-- Accents (Small blue highlight blocks on the sides) -->
    <!-- Left Accents -->
    <polygon points="60,36 50,42 50,52 60,46" class="accent" />
    <polygon points="60,164 50,158 50,148 60,154" class="accent" />
    <!-- Right Accents -->
    <polygon points="140,36 150,42 150,52 140,46" class="accent-dark" />
    <polygon points="140,164 150,158 150,148 140,154" class="accent-dark" />
    
    <!-- Center top/bottom pillars -->
    <polygon points="100,8 94,11 94,24 100,28" class="accent" />
    <polygon points="100,192 94,189 94,176 100,172" class="accent" />
    <polygon points="100,8 106,11 106,24 100,28" class="accent-dark" />
    <polygon points="100,192 106,189 106,176 100,172" class="accent-dark" />
  </g>

  <!-- The letter S perfectly centered -->
  <!-- Split gradient ensures the left is light, right is dark -->
  <text x="100" y="124" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="900" fill="url(#splitGradient)" text-anchor="middle">S</text>
</svg>
