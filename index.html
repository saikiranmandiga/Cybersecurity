        .neon-text-blue { color: #0088ff; text-shadow: 0 0 10px rgba(0, 136, 255, 0.6); }
        .neon-text-red { color: #ff003c; text-shadow: 0 0 10px rgba(255, 0, 60, 0.6); }

        .neon-border-red { border-color: #ff003c; box-shadow: 0 0 15px rgba(255, 0, 60, 0.3), inset 0 0 10px rgba(255, 0, 60, 0.1); }
        
        /* Glassmorphism Panels */
        .glass-panel { 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.7) 0%, rgba(3, 7, 18, 0.8) 100%);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);

        /* Profile Glow */
        .profile-glow {
            position: relative;
            border-radius: 50%;
            background: #030712;
            padding: 4px;
        }
        .profile-glow::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #00ffcc, #0088ff, #ff003c, #00ffcc);
            z-index: -1;
            border-radius: 50%;
            background-size: 400%;
            animation: glowing 20s linear infinite;
        }
        
        @keyframes glowing {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,255,204,0.02) 50%, rgba(0,255,204,0.02));
            background-size: 100% 4px;
            pointer-events: none;

        /* Cyber Grid & Canvas Underlays */

            z-index: -2;
            opacity: 0.3; /* Subtle so it doesn't overpower the text */

        ::-webkit-scrollbar { width: 8px; }

    <!-- MATRIX DIGITAL RAIN SCRIPT -->
    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas to full screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Characters to display (Katakana + Latin + Numerals)
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ'.split('');

        const fontSize = 14;
        const columns = canvas.width / fontSize;

        // Array for the drops - one per column
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100; // Start off-screen
        }

        function drawMatrix() {
            // Translucent black background creates the "fading tail" effect
            ctx.fillStyle = 'rgba(3, 7, 18, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ffcc'; // Cyberpunk green/cyan text
            ctx.font = fontSize + 'px "Share Tech Mono"'; // Match our monospace font

            for (let i = 0; i < drops.length; i++) {
                // Pick a random character
                const text = chars[Math.floor(Math.random() * chars.length)];
                
                // Draw the character
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Send drop back to top randomly after it crosses the screen
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                // Move drop down
                drops[i]++;
            }
        }

        // Run the matrix animation at roughly 33fps
        setInterval(drawMatrix, 35);

        // Handle resize for Matrix
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Recalculate columns if screen gets wider
            const newCols = canvas.width / fontSize;
            if (newCols > drops.length) {
                for (let x = drops.length; x < newCols; x++) {
                    drops[x] = Math.random() * -100;
                }
            }
        });
    </script>

    <!-- LIVE CYBER NEWS SCRIPT -->
    <script>
        async function fetchCyberNews() {
            const container = document.getElementById('news-container');
            // Using a free RSS to JSON converter hitting The Hacker News RSS feed
            const rssUrl = encodeURIComponent('https://feeds.feedburner.com/TheHackersNews');
            const apiEndpoint = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            try {
                const response = await fetch(apiEndpoint);
                const data = await response.json();

                if (data.status === 'ok') {
                    if (container) {
                        container.innerHTML = ''; // clear loading state
                        
                        // Take more items to make the scrolling ticker look full
                        const items = data.items.slice(0, 6);
                        const escapeStr = (s) => s.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]));
                        
                        let newsHtml = '';
                        items.forEach((item) => {
                            const date = new Date(item.pubDate).toLocaleDateString();
                            newsHtml += `
                                <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="block p-3 bg-black/80 border border-[#ff003c]/30 rounded hover:border-[#ff003c] transition-colors group">
                                    <div class="flex items-start justify-between gap-2">
                                        <h5 class="text-xs text-white font-medium line-clamp-2 group-hover:text-[#ff003c] transition-colors uppercase mono">${escapeStr(item.title)}</h5>
                                        <span class="mono text-[10px] text-gray-500 shrink-0">${escapeStr(date)}</span>
                                    </div>
                                </a>
                            `;
                        });
                        
                        // Joint twice for seamless loop
                        container.innerHTML = newsHtml + newsHtml;
                    }
                } else {
                    throw new Error('Feed status not OK');
                }
            } catch (error) {
                console.error("Failed to fetch news:", error);
                if (container) {
                    container.innerHTML = `
                        <div class="h-full flex items-center justify-center text-gray-500 mono text-xs text-center border border-dashed border-gray-700 p-4 rounded">
                            Failed to intercept external signals.<br>Systems isolated.
                        </div>
                    `;
                }
            }
        }

        fetchCyberNews();
    </script>

    <!-- ANTI-GRAVITY SCRIPT (MATTER.JS) -->
    <script>
        let isMatterActive = false;
        let isZeroGravity = false;
        let pEngine = null;

        function toggleGravity() {
            const btn = document.getElementById('gravity-btn');

            if (!isMatterActive) {
                // First click: Initialize Physics Engine
                window.scrollTo({ top: 0, behavior: 'auto' });
                btn.innerHTML = '<i class="fa-solid fa-satellite mr-2"></i> [ ZERO-G OVERRIDE ]';
                btn.classList.replace('text-[#ff003c]', 'text-[#00ffcc]');
                btn.classList.replace('border-[#ff003c]', 'border-[#00ffcc]');
                btn.classList.replace('hover:bg-[#ff003c]', 'hover:bg-[#00ffcc]');
                
                setTimeout(() => {
                    activateMatterJs();
                    isMatterActive = true;
                }, 50);
            } else {
                // Subsequent clicks: Toggle gravity amount
                if (isZeroGravity) {
                    // Turn Gravity ON (Falling)
                    pEngine.world.gravity.y = 1;
                    isZeroGravity = false;
                    btn.innerHTML = '<i class="fa-solid fa-satellite mr-2"></i> [ ZERO-G OVERRIDE ]';
                    btn.classList.replace('text-[#ff003c]', 'text-[#00ffcc]');
                    btn.classList.replace('border-[#ff003c]', 'border-[#00ffcc]');
                    btn.classList.replace('hover:bg-[#ff003c]', 'hover:bg-[#00ffcc]');
                } else {
                    // Turn Gravity OFF (Floating)
                    pEngine.world.gravity.y = 0;
                    isZeroGravity = true;
                    btn.innerHTML = '<i class="fa-solid fa-arrow-down mr-2"></i> [ RESTORE GRAVITY ]';
                    btn.classList.replace('text-[#00ffcc]', 'text-[#ff003c]');
                    btn.classList.replace('border-[#00ffcc]', 'border-[#ff003c]');
                    btn.classList.replace('hover:bg-[#00ffcc]', 'hover:bg-[#ff003c]');
                }
            }
        }

        function activateMatterJs() {
            // Lock scrolling on viewport
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';

            const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Body } = Matter;

            pEngine = Engine.create();
            pEngine.world.gravity.y = 1;

            const renderWidth = window.innerWidth;
            const renderHeight = window.innerHeight;

            const render = Render.create({
                element: document.body,
                engine: pEngine,
                options: {
                    width: renderWidth,
                    height: renderHeight,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // The matter canvas sits in front of all HTML and captures mouse drag events.
            render.canvas.className = 'interactive-canvas';
            render.canvas.style.pointerEvents = 'auto'; 
            render.context.globalAlpha = 0;

            const items = document.querySelectorAll('.physics-item');
            const bodiesMap = [];

            // Measure and create physical bodies
            items.forEach((el) => {
                const rect = el.getBoundingClientRect();
                if (rect.width === 0 || rect.height === 0) return;

                const left = rect.left;
                const top = rect.top;

                const body = Bodies.rectangle(
                    left + rect.width / 2, 
                    top + rect.height / 2, 
                    rect.width, 
                    rect.height, 
                    { 
                        restitution: 0.6, // Bounce
                        friction: 0.1,
                        frictionAir: 0.02,
                        density: 0.01,
                        render: { visible: false } 
                    }
                );

                bodiesMap.push({ element: el, body: body, width: rect.width, height: rect.height });
            });

            // Make HTML absolute and attach to bodies
            bodiesMap.forEach(item => {
                const el = item.element;
                el.style.width = item.width + 'px';
                el.style.height = item.height + 'px';
                el.style.margin = '0';
                
                document.body.appendChild(el);

                el.style.position = 'absolute';
                el.style.top = '0px';
                el.style.left = '0px';
                el.style.zIndex = '50';
                el.style.pointerEvents = 'none';

                Composite.add(pEngine.world, item.body);
            });

            document.getElementById('main-container').style.display = 'none';

            // Walls
            const wallOptions = { isStatic: true, render: { visible: false } };
            const t = 100;
            const ground = Bodies.rectangle(renderWidth / 2, renderHeight + t/2, renderWidth * 2, t, wallOptions);
            const ceiling = Bodies.rectangle(renderWidth / 2, -t/2, renderWidth * 2, t, wallOptions);
            const leftWall = Bodies.rectangle(-t/2, renderHeight / 2, t, renderHeight * 2, wallOptions);
            const rightWall = Bodies.rectangle(renderWidth + t/2, renderHeight / 2, t, renderHeight * 2, wallOptions);

            Composite.add(pEngine.world, [ground, ceiling, leftWall, rightWall]);

            // Mouse interaction 
            const mouse = Mouse.create(render.canvas);
            const mouseConstraint = MouseConstraint.create(pEngine, {
                mouse: mouse,
                constraint: { stiffness: 0.2, render: { visible: false } }
            });
            Composite.add(pEngine.world, mouseConstraint);
            render.mouse = mouse;

            Render.run(render);
            const runner = Runner.create();
            Runner.run(runner, pEngine);

            // Sync HTML to physics
            Events.on(pEngine, 'afterUpdate', function() {
                bodiesMap.forEach(item => {
                    const x = item.body.position.x - item.width / 2;
                    const y = item.body.position.y - item.height / 2;
                    const angle = item.body.angle;
                    item.element.style.transform = `translate(${x}px, ${y}px) rotate(${angle}rad)`;
                });
            });

            // Handle Resize bounds
            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                render.canvas.width = w;
                render.canvas.height = h;
                Body.setPosition(ground, { x: w / 2, y: h + t/2 });
                Body.setPosition(rightWall, { x: w + t/2, y: h / 2 });
                Body.setPosition(ceiling, { x: w / 2, y: -t/2 });
            });
        }
    </script>
