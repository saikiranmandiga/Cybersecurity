<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base - SK Cyberops</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    
    <!-- Central Portfolio Configuration -->
    <script src="./config.js?v=1.3"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: '#040d1a',
                        neon: '#00ffcc',
                        neonblue: '#0088ff',
                        glassbg: 'rgba(10, 15, 30, 0.7)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Prism.js for Code Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css" rel="stylesheet" />
    
    <style>
        body {
            background-color: #040d1a;
            color: #e2e8f0;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 204, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 136, 255, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .neon-text-green {
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        /* Markdown-style content formatting for Gemini generated text */
        .gemini-content h2 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .gemini-content h3 {
            color: #0088ff;
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .gemini-content p {
            margin-bottom: 1rem;
            line-height: 1.7;
            color: #cbd5e1;
        }

        .gemini-content ul, .gemini-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            color: #cbd5e1;
        }

        .gemini-content li {
            margin-bottom: 0.5rem;
        }

        .gemini-content ul { list-style-type: disc; }
        .gemini-content ul li::marker { color: #0088ff; }

        /* Tech Blocks resembling reference site */
        .tech-block {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 0.5rem;
            padding: 1.25rem;
            margin: 1.5rem 0;
            border-left: 4px solid #0088ff;
        }
        
        .tech-block.error { border-left-color: #ef4444; }
        .tech-block.success { border-left-color: #10b981; }
        .tech-block.warning { border-left-color: #f59e0b; }

        .tech-block h4 {
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        /* Inline code */
        .gemini-content p code, .gemini-content li code {
            background: rgba(0, 0, 0, 0.4);
            color: #00ffcc;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(0,255,204,0.2);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 glass-panel border-b-0 border-t-0 border-l-0 border-r-0 border-b border-gray-800/50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo Binding via config.js -->
                <div class="flex-shrink-0 flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                    <img src="./logo.svg" alt="SK Cyberops Logo" class="w-8 h-8 md:w-10 md:h-10">
                    <span id="nav-cfg-name" class="font-bold text-white text-lg md:text-xl tracking-widest font-mono uppercase">SK CYBEROPS</span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8 font-mono text-sm">
                        <a href="index.html" class="text-gray-300 hover:text-[#00ffcc] transition-colors"><i class="fa-solid fa-house mr-1"></i> Dashboard</a>
                        <a href="threat-map.html" class="text-gray-300 hover:text-[#00ffcc] transition-colors"><i class="fa-solid fa-earth-americas mr-1"></i> Global Threats</a>
                        <a href="soc-simulator.html" class="text-gray-300 hover:text-[#00ffcc] transition-colors"><i class="fa-solid fa-shield-virus mr-1"></i> SOC Simulator</a>
                        <a href="knowledge-base.html" class="text-[#00ffcc] border-b-2 border-[#00ffcc] pb-1"><i class="fa-solid fa-book-journal-whills mr-1"></i> Knowledge Base</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Container (Index View) -->
    <main class="flex-grow pt-32 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">
        
        <header class="mb-12 text-center md:text-left border-b border-gray-800/50 pb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4 tracking-tight mono uppercase"><i class="fa-solid fa-book-journal-whills mr-3 text-[#00ffcc]"></i> Knowledge Base</h1>
            <p class="text-lg text-gray-400">Technical insights, security playbooks, and research articles.</p>
        </header>

        <!-- Dynamic Grid for Articles -->
        <div id="kb-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- JavaScript will populate cards here -->
        </div>
        
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800/50 bg-black/40 mt-12 py-8 text-center text-sm font-mono text-gray-500">
        <p>SK Cyberops Knowledge Base &copy; 2024</p>
        <p class="mt-2 text-xs opacity-50">Content optimized for Gemini injection.</p>
    </footer>

    <!-- Prism.js for Code Highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    
    <!-- Config Binding Script -->
    <!-- Grid rendering logic is now handled globally in config.js module -->
</body>
</html>
